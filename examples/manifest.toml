# Generated by dock2flox — https://github.com/flox/dock2flox
# Review all entries marked with REVIEW or UNMAPPED before activating.
# Flox manifest version managed by Flox CLI
schema-version = "1.11.0"

[install]
curl.pkg-path = "curl"
# also install gnumake and binutils
gcc.pkg-path = "gcc"
git.pkg-path = "git"
pkg-config.pkg-path = "pkg-config"
postgresql.pkg-path = "postgresql"
python3.pkg-path = "python3"
python3.version = "3.13"
# installer for Python project dependencies
uv.pkg-path = "uv"

[vars]
APP_ENV = "development"
DATABASE_URL = "postgresql://localhost:5432/myapp"
DOCK2FLOX_CONTAINER_CMD = "uvicorn app.main:app --host 0.0.0.0 --port 8000"
DOCK2FLOX_CONTAINER_WORKDIR = "/app"
DOCK2FLOX_EXPOSED_PORTS = "8000"

[hook]
on-activate = '''
export UV_CACHE_DIR="$FLOX_ENV_CACHE/uv"
export PIP_CACHE_DIR="$FLOX_ENV_CACHE/pip"
mkdir -p "$FLOX_ENV_CACHE/uv" "$FLOX_ENV_CACHE/pip"
export DOCK2FLOX_ACTIVATE_DIR="$FLOX_ENV_PROJECT"

if [ -f "requirements.txt" ]; then
  uv pip install --quiet -r "requirements.txt"
fi
# Docker WORKDIR /app preserved; activation directory is mapped below when possible.
# Docker CMD preserved for generated app service: uvicorn app.main:app --host 0.0.0.0 --port 8000
# Docker COPY requirements.txt . preserved as filesystem/build context metadata.
# Docker COPY . . preserved as filesystem/build context metadata.
# Docker EXPOSE 8000 preserved as metadata; Flox does not publish ports automatically.

cd "${DOCK2FLOX_ACTIVATE_DIR:-$FLOX_ENV_PROJECT}"
'''

[services]
app.command = '''
# Derived from Dockerfile ENTRYPOINT/CMD. Review filesystem, user, port, and volume assumptions before treating this as production-equivalent.
cd "${DOCK2FLOX_ACTIVATE_DIR:-$FLOX_ENV_PROJECT}"
uvicorn app.main:app --host 0.0.0.0 --port 8000
'''

[options]
systems = [
  "aarch64-darwin",
  "aarch64-linux",
  "x86_64-darwin",
  "x86_64-linux",
]
