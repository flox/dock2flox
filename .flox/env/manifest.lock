    "schema-version": "1.11.0",
    "install": {
      "bash": {
        "pkg-path": "bash"
      },
      "colima": {
        "pkg-path": "colima"
      },
      "coreutils": {
        "pkg-path": "coreutils"
      },
      "docker": {
        "pkg-path": "docker-client"
      },
      "gawk": {
        "pkg-path": "gawk"
      },
      "gnugrep": {
        "pkg-path": "gnugrep"
      },
      "gnused": {
        "pkg-path": "gnused"
      },
      "python3": {
        "pkg-path": "python3"
      },
      "pyyaml": {
        "pkg-path": "python313Packages.pyyaml"
      }
    },
    "options": {
      "systems": [
        "aarch64-darwin",
        "aarch64-linux",
        "x86_64-darwin",
        "x86_64-linux"
      ]
    },
    "services": {
      "colima": {
        "command": "colima start --foreground"
      }
    },
    "build": {
      "dock2flox": {
        "command": "  mkdir -p \"$out/bin\" \"$out/share/dock2flox\"\n\n  # Copy the tool tree into share/dock2flox/\n  cp -r bin lib data \"$out/share/dock2flox/\"\n  chmod +x \"$out/share/dock2flox/bin/dock2flox\"\n\n  # Create wrapper at $out/bin/dock2flox\n  cat > \"$out/bin/dock2flox\" << 'WRAPPER'\n#!/usr/bin/env bash\nREAL_DIR=\"$(cd \"$(dirname \"$(readlink -f \"$0\")\")\" && pwd)\"\nexport DOCK2FLOX_ROOT=\"$(cd \"$REAL_DIR/../share/dock2flox\" && pwd)\"\nexec bash \"$DOCK2FLOX_ROOT/bin/dock2flox\" \"$@\"\nWRAPPER\n  chmod +x \"$out/bin/dock2flox\"\n",
        "runtime-packages": [
          "bash",
          "coreutils",
          "gnugrep",
          "gnused",
          "gawk",
          "python3",
          "pyyaml"
        ],
        "description": "Convert Dockerfiles, Compose files, and devcontainer configs to Flox environments"
      }
    }
  },
