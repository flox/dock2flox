# Review all entries marked with REVIEW or UNMAPPED before activating.
# Flox manifest version managed by Flox CLI
schema-version = "1.11.0"

[install]
curl.pkg-path = "curl"
# also install gnumake and binutils
gcc.pkg-path = "gcc"
git.pkg-path = "git"
openssl.pkg-path = "openssl"
pkg-config.pkg-path = "pkg-config"
postgresql.pkg-path = "postgresql"
python3.pkg-path = "python311"
python3.version = "3.11"

[vars]
APP_ENV = "development"
LOG_LEVEL = "info"
PGHOST = "localhost"
PGPORT = "5432"

[hook]
on-activate = '''
# pip: pip install --no-cache-dir -r requirements.txt

cd "$FLOX_ENV_PROJECT"
'''

[services]

[options]
systems = [
  "aarch64-darwin",
  "aarch64-linux",
  "x86_64-darwin",
  "x86_64-linux",
]
